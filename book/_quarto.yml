project:
  type: book
  output-dir: dist
  render:
    - index.qmd

book:
  title: "Lecture for graduate students 2026"
  author: "Hiroshi Shinaoka"
  chapters:
    - index.qmd
  repo-url: "https://github.com/shinaoka/graduate2026"

format:
  html:
    theme: cosmo
    lang: en
    toc: true
    code-copy: true
    code-overflow: wrap
    css: custom.css
    include-after-body: custom.js
